name: Deploy Agent PMO Website to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build site
        run: npm run build
        working-directory: website
        env:
          # Served at the apex custom domain (agentpmo.dev), so the site lives at
          # the root — NOT under /<repo>/. A repo-name prefix here makes every
          # asset URL resolve to agentpmo.dev/AgentPMOWorkflow/... and 404.
          ELEVENTY_PATH_PREFIX: /
          SITE_URL: https://agentpmo.dev

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
