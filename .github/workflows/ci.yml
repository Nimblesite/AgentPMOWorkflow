name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Playwright dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: dashboard
        # DEBIAN_FRONTEND/NEEDRESTART_MODE stop the apt `--with-deps` phase from
        # hanging on the interactive needrestart prompt on ubuntu-24.04 runners.
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: npx playwright install --with-deps chromium

      # `make test` runs F# fixture tests (which generate the report HTML)
      # then Playwright E2E tests against the generated HTML, fail-fast.
      - name: Test
        run: make test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7
