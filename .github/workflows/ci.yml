name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Playwright dependencies
        working-directory: dashboard
        run: npm ci

      # apt system deps for chromium (this phase works; keep it non-interactive
      # so needrestart/debconf don't block on ubuntu-24.04 runners).
      - name: Install Playwright system deps
        working-directory: dashboard
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: npx playwright install-deps chromium

      # The browser-binary download intermittently stalls at 100% on the runner
      # and would otherwise eat the whole job timeout. Cap each attempt and retry.
      - name: Install Playwright browser (chromium)
        working-directory: dashboard
        run: |
          for attempt in 1 2 3; do
            echo "::group::playwright install chromium (attempt $attempt)"
            if timeout 240 npx playwright install chromium; then
              echo "::endgroup::"; exit 0
            fi
            echo "::endgroup::"
            echo "attempt $attempt stalled or failed; retrying"
          done
          echo "playwright browser install failed after 3 attempts" >&2
          exit 1

      # `make test` runs F# fixture tests (which generate the report HTML)
      # then Playwright E2E tests against the generated HTML, fail-fast.
      - name: Test
        run: make test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7
