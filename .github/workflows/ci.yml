name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether the PR touches anything outside website/**. The dashboard
  # test suite is irrelevant to website-only changes, so we skip it then.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect non-website changes
        id: filter
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          # "code=true" when any changed file lives outside website/**.
          # A website-only PR yields "code=false" and skips the dashboard tests.
          if git diff --name-only "$BASE" "$HEAD" | grep -qvE '^website/'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed files:"
          git diff --name-only "$BASE" "$HEAD"

  dashboard-tests:
    name: Dashboard tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run inside Microsoft's official Playwright image: browsers + OS deps are
    # pre-baked, so we skip `playwright install` entirely. The native runner
    # deterministically hangs at 100% of the chromium download; the container
    # avoids that download. Tag MUST match the @playwright/test version in
    # dashboard/package-lock.json (currently 1.60.0).
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v6

      # The Playwright image is minimal: ensure make (build entrypoint) and git
      # (the F# fixture tests init/inspect temp repos) are present.
      - name: Install make and git
        run: |
          apt-get update
          apt-get install -y --no-install-recommends make git

      # Match GitHub's native runner: mock repos in the F# fixture tests are
      # created with `git init`, and the tests expect the default branch `main`.
      # The container's git would otherwise default to `master`.
      - name: Configure git defaults
        run: |
          git config --global init.defaultBranch main
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install Node dependencies
        working-directory: dashboard
        run: npm ci

      # No `playwright install` — browsers ship with the container image.
      # `make test` runs F# fixture tests (which generate the report HTML)
      # then Playwright E2E tests against the generated HTML, fail-fast.
      - name: Test
        run: make test

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

  # Required status check. Always runs so it reports a real conclusion: a
  # website-only PR (dashboard tests skipped) stays mergeable, while a PR that
  # touches code fails here when the dashboard tests fail. Keep the name "Test"
  # — it is the required check configured in branch protection.
  Test:
    name: Test
    needs: [changes, dashboard-tests]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate on dashboard tests
        run: |
          changes_result="${{ needs.changes.result }}"
          tests_result="${{ needs.dashboard-tests.result }}"
          echo "change detection: $changes_result | dashboard tests: $tests_result"
          if [ "$changes_result" != "success" ]; then
            echo "::error::change detection did not succeed"; exit 1
          fi
          if [ "$tests_result" = "success" ] || [ "$tests_result" = "skipped" ]; then
            echo "Passing (tests $tests_result)"; exit 0
          fi
          echo "::error::dashboard tests did not pass ($tests_result)"; exit 1

  # Dependency review ([GITHUB-DEP-REVIEW]) — blocks PRs that pull in npm deps
  # with known vulnerabilities. CodeQL source scanning is separate in codeql.yml.
  security:
    name: security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write  # dependency-review posts its PR summary
    steps:
      - uses: actions/checkout@v6
      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
