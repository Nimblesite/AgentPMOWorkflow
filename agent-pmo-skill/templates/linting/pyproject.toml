# =============================================================================
# Python lint + type-check configuration
#
# Layer order (PRIMARY → secondary). See REPO-STANDARDS-SPEC §4.6
# [LINT-PYTHON-BASILISK]:
#
#   1. Basilisk  — PRIMARY linter AND type checker. Non-negotiable.
#                  `make lint` runs Basilisk first; failure here blocks the build.
#   2. ruff      — secondary linter + the auto-formatter (`make fmt`).
#                  `select = ["ALL"]`. Catches what Basilisk doesn't.
#   3. pyright   — secondary type checker. Safety net under Basilisk.
# =============================================================================

# ----- PRIMARY: Basilisk (linter + type checker) -----
[tool.basilisk]
python-version = "3.12"
python-platform = "All"
include = ["src/", "tests/"]
exclude = ["**/migrations/**", "**/generated/**"]

[tool.basilisk.mojo-safety]
ownership = true
immutability = true
no-implicit-coercion = true

# ----- SECONDARY: ruff (lint + format) -----
[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "."]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "D",       # pydocstring — handled separately
  "COM812",  # trailing comma — conflicts with formatter
  "ISC001",  # single-line implicit concat — conflicts with formatter
  "ANN101",  # self type annotation
  "ANN102",  # cls type annotation
  "FIX002",  # todos in code — allowed
  "TD",      # todo formatting — too strict
]
unfixable = ["ERA001"]  # never auto-remove commented code

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ANN"]  # allow assert + skip annotations in tests

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"

# ----- SECONDARY: pyright (type-check safety net) -----
[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src", "tests"]
exclude = ["**/migrations", "**/generated"]
