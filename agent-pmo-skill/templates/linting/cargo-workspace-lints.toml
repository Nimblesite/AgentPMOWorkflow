[workspace.lints.rust]
unsafe_code = "deny"
missing_docs = "deny"
missing_debug_implementations = "deny"
unused_imports = "deny"
dead_code = "deny"
unused_variables = "deny"
unused_mut = "deny"
unused_assignments = "deny"
unused_results = "deny"
trivial_casts = "deny"
trivial_numeric_casts = "deny"
elided_lifetimes_in_paths = "deny"
future_incompatible = { level = "deny", priority = -1 }
nonstandard_style = { level = "deny", priority = -1 }
rust_2018_idioms = { level = "deny", priority = -1 }

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
unreachable = "deny"
indexing_slicing = "deny"
arithmetic_side_effects = "deny"
missing_docs_in_private_items = "deny"

# NOTE: `float_arithmetic = "deny"` is INTENTIONALLY NOT enabled here.
#
# The lint is useful for a narrow class of repos — cryptography, consensus
# protocols, money handling, reproducible hashing — where the
# non-associativity and platform-dependence of IEEE-754 float ops are a real
# correctness hazard and all math must live in integer or decimal space.
#
# For general-purpose repos it is too aggressive: any real numeric work
# (scoring, statistics, timing, ML embeddings, geometry, coordinate math,
# plotting, physics, signal processing) uses floats legitimately, and
# denying the lint at the workspace level forces either `#[allow]`
# suppressions (which the rest of this template bans) or awkward integer
# workarounds that buy no safety.
#
# If a specific crate genuinely needs bit-exact float-free arithmetic, add
# `#![deny(clippy::float_arithmetic)]` as a crate-level attribute inside
# that crate's root module. Do NOT promote it back to the workspace.
