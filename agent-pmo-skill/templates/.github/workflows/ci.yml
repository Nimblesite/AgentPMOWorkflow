name: CI

on:
  # CI always runs for PRs. 
  # It may or may not run for pushes to main, depending on the repo settings,
  # but if the repo allows commits outside the verified PR commits, the CI should
  # run for pushes to main as well. Make a note of this to the user when appropriate
  pull_request:
    branches: [main]


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # ---- language setup (uncomment what applies) ----
      # - uses: dtolnay/rust-toolchain@stable
      #   with:
      #     components: rustfmt, clippy

      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      #     cache: 'npm'

      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.12'
      #     cache: 'pip'

      # - uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: '9.0.x'

      # - uses: subosito/flutter-action@v2
      #   with:
      #     flutter-version: '3.27.4'
      #     channel: 'stable'
      #     cache: true

      # - uses: actions/setup-go@v5
      #   with:
      #     go-version: '1.23'
      #     cache: true

      # ---- install ----
      # - run: npm ci
      # - run: pip install -r requirements.txt pytest-cov
      # - run: dotnet restore
      # - run: dotnet tool restore
      # - run: flutter pub get
      # Rust: cargo install cargo-llvm-cov

      # fmt, lint, test are three separate, non-overlapping steps.
      - name: Format check
        run: make fmt CHECK=1

      - name: Lint
        run: make lint

      # Deslop duplication gate ([CI-DESLOP]). KEEP ONLY for repos in a Deslop-supported
      # language (Rust, C#, Dart, Python); delete this whole step otherwise.
      # The threshold lives in committed .deslop.toml — ratcheted DOWN, never up.
      # `deslop .` reads it and exits 3 (tanks the build) when duplication exceeds it.
      - name: Deslop duplication gate
        env:
          DESLOP_VERSION: "0.5.1"  # pin — see https://github.com/Nimblesite/Deslop/releases
        run: |
          curl -sSfL "https://github.com/Nimblesite/Deslop/releases/download/v${DESLOP_VERSION}/deslop-${DESLOP_VERSION}-linux-x64.tar.gz" | tar -xz
          echo "$PWD/deslop-${DESLOP_VERSION}-linux-x64" >> "$GITHUB_PATH"
          deslop .

      # make test = fail-fast + coverage + threshold enforcement ([TEST-RULES]).
      # Thresholds live in coverage-thresholds.json ([COVERAGE-THRESHOLDS-JSON]).
      - name: Test
        run: make test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/
            htmlcov/
            lcov.info
            coverage.out
            TestResults/**/coverage.*
            target/llvm-cov/
            deslop-report.json
          retention-days: 7

      - name: Build
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            out/
            target/release/
          retention-days: 7
