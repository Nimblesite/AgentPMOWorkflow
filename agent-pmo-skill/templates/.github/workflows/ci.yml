name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # ---- language setup (uncomment what applies) ----
      # - uses: dtolnay/rust-toolchain@stable
      #   with:
      #     components: rustfmt, clippy

      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      #     cache: 'npm'

      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.12'
      #     cache: 'pip'

      # - uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: '9.0.x'

      # - uses: subosito/flutter-action@v2
      #   with:
      #     flutter-version: '3.27.4'
      #     channel: 'stable'
      #     cache: true

      # - uses: actions/setup-go@v5
      #   with:
      #     go-version: '1.23'
      #     cache: true

      # ---- install ----
      # - run: npm ci
      # - run: pip install -r requirements.txt pytest-cov
      # - run: dotnet restore
      # - run: dotnet tool restore
      # - run: flutter pub get
      # Rust: cargo install cargo-llvm-cov

      - name: Lint
        run: make lint

      # `make test` is fail-fast AND enforces coverage thresholds from
      # `coverage-thresholds.json` at the repo root. See REPO-STANDARDS-SPEC §3
      # ([TEST-FAIL-FAST], [COVERAGE-THRESHOLDS-JSON]).
      # NEVER add a separate "coverage-check" step here.
      # NEVER add COVERAGE_THRESHOLD env vars or reference `vars.COVERAGE_*`.
      # Thresholds live in coverage-thresholds.json — that is the only source.
      - name: Test
        run: make test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/
            htmlcov/
            lcov.info
            coverage.out
            TestResults/**/coverage.*
            target/llvm-cov/
          retention-days: 7

      - name: Build
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            out/
            target/release/
          retention-days: 7
